# Namespace
apiVersion: v1
kind: Namespace
metadata:
  name: plant-disease-ai
  labels:
    app: plant-disease-ai

---
# Ingress (nginx ingress controller)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: plant-disease-ingress
  namespace: plant-disease-ai
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/proxy-body-size: "15m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "120"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/limit-connections: "20"
    nginx.ingress.kubernetes.io/limit-rps: "10"
spec:
  tls:
    - hosts:
        - plantdisease.yourdomain.com
      secretName: plant-disease-tls
  rules:
    - host: plantdisease.yourdomain.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: plant-disease-api-svc
                port:
                  number: 80
          - path: /
            pathType: Prefix
            backend:
              service:
                name: plant-disease-frontend-svc
                port:
                  number: 80

---
# ConfigMap for non-secret config
apiVersion: v1
kind: ConfigMap
metadata:
  name: plant-disease-config
  namespace: plant-disease-ai
data:
  redis_url: "redis://redis-svc:6379/0"
  s3_bucket_name: "plant-disease-images"
  s3_region: "us-east-1"
  mlflow_tracking_uri: "http://mlflow-svc:5000"
  cors_origins: "https://plantdisease.yourdomain.com"

---
# Persistent Volume Claim for model weights (ReadWriteMany for multi-pod)
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: model-weights-pvc
  namespace: plant-disease-ai
spec:
  accessModes:
    - ReadOnlyMany
  resources:
    requests:
      storage: 5Gi
  storageClassName: nfs-client  # or efs-sc on AWS

---
# ServiceAccount
apiVersion: v1
kind: ServiceAccount
metadata:
  name: plant-disease-api
  namespace: plant-disease-ai
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT:role/plant-disease-api-role
    # Required for S3 access via IAM roles for service accounts (IRSA) on EKS
