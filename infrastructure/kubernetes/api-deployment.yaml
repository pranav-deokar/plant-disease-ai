# ────────────────────────────────────────────────────────────────────────────────
# Kubernetes Deployment — Plant Disease AI Backend API
# Production-grade: HPA, resource limits, rolling updates, probes
# ────────────────────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: plant-disease-api
  namespace: plant-disease-ai
  labels:
    app: plant-disease-api
    version: v1
    component: backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: plant-disease-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  template:
    metadata:
      labels:
        app: plant-disease-api
        version: v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: plant-disease-api
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001

      initContainers:
        - name: wait-for-db
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z postgres-svc 5432; do sleep 2; done']

      containers:
        - name: api
          image: your-registry/plant-disease-api:v1.0.0
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
              name: http
              protocol: TCP

          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: plant-disease-secrets
                  key: database_url
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: plant-disease-secrets
                  key: secret_key
            - name: MONGODB_URL
              valueFrom:
                secretKeyRef:
                  name: plant-disease-secrets
                  key: mongodb_url
            - name: REDIS_URL
              valueFrom:
                configMapKeyRef:
                  name: plant-disease-config
                  key: redis_url
            - name: S3_BUCKET_NAME
              valueFrom:
                configMapKeyRef:
                  name: plant-disease-config
                  key: s3_bucket_name
            - name: ENVIRONMENT
              value: "production"
            - name: LOG_LEVEL
              value: "INFO"
            - name: DEBUG
              value: "false"

          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2000m"
              memory: "4Gi"

          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /api/v1/health/ready
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3

          volumeMounts:
            - name: model-weights
              mountPath: /app/models
              readOnly: true

      volumes:
        - name: model-weights
          persistentVolumeClaim:
            claimName: model-weights-pvc

      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: plant-disease-api

---
apiVersion: v1
kind: Service
metadata:
  name: plant-disease-api-svc
  namespace: plant-disease-ai
spec:
  selector:
    app: plant-disease-api
  ports:
    - name: http
      port: 80
      targetPort: 8000
      protocol: TCP
  type: ClusterIP

---
# Horizontal Pod Autoscaler
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: plant-disease-api-hpa
  namespace: plant-disease-ai
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: plant-disease-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
