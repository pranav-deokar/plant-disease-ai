name: CI / CD — Plant Disease AI

on:
  push:
    branches: [main, develop]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main, develop]

env:
  REGISTRY: ghcr.io/${{ github.repository_owner }}
  IMAGE_NAME: plant-disease-api

jobs:

  # ── Backend Tests ─────────────────────────────────────────────────────────────
  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: plant_disease_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: --health-cmd "redis-cli ping" --health-interval 10s

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: |
          pip install --upgrade pip
          pip install uv
          uv pip install --system -r requirements.txt
          pip install aiosqlite pytest-asyncio

      - name: Run linting (ruff)
        working-directory: backend
        run: |
          pip install ruff
          ruff check app/ tests/

      - name: Run tests with coverage
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/plant_disease_test
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: test-secret-key-not-for-production-use
          MONGODB_URL: mongodb://localhost:27017
          S3_ENDPOINT_URL: ""
          S3_BUCKET_NAME: test-bucket
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
          MLFLOW_TRACKING_URI: http://localhost:5000
          DEBUG: "true"
          LOG_LEVEL: WARNING
        run: |
          pytest tests/ \
            -v \
            --tb=short \
            --cov=app \
            --cov-report=xml \
            --cov-report=term-missing \
            -m "not slow"

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: backend/coverage.xml
          flags: backend
          fail_ci_if_error: false

  # ── Frontend Tests ────────────────────────────────────────────────────────────
  test-frontend:
    name: Frontend Tests & Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: |
          npm run lint 2>/dev/null || true   # warn only for now

      - name: Build production bundle
        working-directory: frontend
        env:
          REACT_APP_API_URL: https://plantdisease.example.com
          CI: false  # don't fail on warnings
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/build/
          retention-days: 7

  # ── ML Smoke Test ─────────────────────────────────────────────────────────────
  test-ml-pipeline:
    name: ML Pipeline Smoke Test
    runs-on: ubuntu-latest
    if: github.event_name == 'push'   # skip on PRs to save time

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install ML dependencies
        run: |
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
          pip install opencv-python-headless pillow scikit-learn numpy

      - name: Smoke test preprocessing
        run: |
          python -c "
          import sys; sys.path.insert(0, 'backend')
          import asyncio
          from PIL import Image
          import io, numpy as np
          from app.ml.preprocessing.image_preprocessor import ImagePreprocessor

          def make_image():
              arr = np.zeros((256,256,3), dtype=np.uint8)
              arr[:,:,1] = 150
              buf = io.BytesIO()
              Image.fromarray(arr,'RGB').save(buf, format='JPEG')
              return buf.getvalue()

          async def run():
              p = ImagePreprocessor(target_size=(224,224))
              result = await p.preprocess_for_inference(make_image())
              assert result.tensor.shape == (1, 3, 224, 224), f'Bad shape: {result.tensor.shape}'
              assert 0 <= result.quality_score <= 1
              print(f'Preprocessing OK. Quality score: {result.quality_score:.3f}')

          asyncio.run(run())
          "

      - name: Smoke test model architecture
        run: |
          python -c "
          import sys; sys.path.insert(0, 'backend')
          import torch
          from app.ml.models.model_manager import EfficientNetB4PlantDisease, NUM_CLASSES

          model = EfficientNetB4PlantDisease(NUM_CLASSES, pretrained=False)
          dummy = torch.zeros(2, 3, 380, 380)
          with torch.no_grad():
              out = model(dummy)
          assert out.shape == (2, NUM_CLASSES), f'Bad output shape: {out.shape}'
          print(f'Model OK. Output shape: {out.shape}')
          "

  # ── Docker Build ──────────────────────────────────────────────────────────────
  build-docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    if: github.event_name == 'push'

    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.build.outputs.digest }}

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-,format=short

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        id: build
        uses: docker/build-push-action@v5
        with:
          context: backend
          file: backend/Dockerfile
          target: production
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            PYTHON_VERSION=3.11

      - name: Image digest
        run: echo "Pushed ${{ steps.build.outputs.digest }}"

  # ── Security Scan ─────────────────────────────────────────────────────────────
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: build-docker
    if: github.event_name == 'push'

    steps:
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: 0   # warn only; set to 1 to fail on HIGH+

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

  # ── Deploy to Staging ─────────────────────────────────────────────────────────
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [build-docker, security-scan]
    if: github.ref == 'refs/heads/develop'
    environment: staging

    steps:
      - uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: v1.28.0

      - name: Configure kubeconfig (staging)
        run: |
          echo "${{ secrets.KUBECONFIG_STAGING }}" | base64 -d > kubeconfig
          export KUBECONFIG=kubeconfig

      - name: Deploy to staging namespace
        env:
          IMAGE_TAG: sha-${{ github.sha }}
        run: |
          kubectl set image deployment/plant-disease-api \
            api=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${IMAGE_TAG} \
            -n plant-disease-staging

          kubectl set image deployment/plant-disease-worker \
            worker=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${IMAGE_TAG} \
            -n plant-disease-staging

          kubectl rollout status deployment/plant-disease-api \
            -n plant-disease-staging --timeout=5m

      - name: Run smoke tests against staging
        run: |
          STAGING_URL="${{ secrets.STAGING_URL }}"
          echo "Testing $STAGING_URL"

          # Health check
          curl -sf "$STAGING_URL/api/v1/health" | python -m json.tool

          # Readiness check
          curl -sf "$STAGING_URL/api/v1/health/ready" | python -m json.tool

          echo "✓ Staging smoke tests passed"

  # ── Deploy to Production ──────────────────────────────────────────────────────
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build-docker, security-scan]
    if: startsWith(github.ref, 'refs/tags/v')
    environment: production   # requires manual approval in GitHub

    steps:
      - uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: v1.28.0

      - name: Configure kubeconfig (production)
        run: |
          echo "${{ secrets.KUBECONFIG_PRODUCTION }}" | base64 -d > kubeconfig
          export KUBECONFIG=kubeconfig

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Deploy to production
        env:
          IMAGE_TAG: ${{ steps.version.outputs.VERSION }}
        run: |
          kubectl set image deployment/plant-disease-api \
            api=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${IMAGE_TAG} \
            -n plant-disease-ai

          kubectl set image deployment/plant-disease-worker \
            worker=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${IMAGE_TAG} \
            -n plant-disease-ai

          kubectl rollout status deployment/plant-disease-api \
            -n plant-disease-ai --timeout=10m

      - name: Post-deploy health check
        run: |
          PROD_URL="${{ secrets.PRODUCTION_URL }}"
          sleep 15  # allow time for pods to warm up

          for i in 1 2 3; do
            if curl -sf "$PROD_URL/api/v1/health/ready"; then
              echo "✓ Production health check passed (attempt $i)"
              exit 0
            fi
            echo "Attempt $i failed, retrying..."
            sleep 10
          done
          echo "✗ Production health check failed after 3 attempts"
          exit 1

      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ steps.version.outputs.VERSION }}
          name: "Plant Disease AI ${{ steps.version.outputs.VERSION }}"
          body: |
            ## Changes
            See [CHANGELOG.md](CHANGELOG.md) for details.

            ## Docker Image
            `${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.VERSION }}`

            ## Deployment
            Deployed to production at ${{ secrets.PRODUCTION_URL }}
          draft: false
          prerelease: ${{ contains(steps.version.outputs.VERSION, '-') }}
