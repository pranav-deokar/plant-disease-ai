<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#16a34a" />

    <!-- SEO -->
    <meta name="description" content="AI-powered plant disease detection. Upload a leaf photo to diagnose crop diseases and get treatment recommendations instantly." />
    <meta name="keywords" content="plant disease, crop disease, leaf diagnosis, AI farming, disease detection" />
    <meta property="og:title" content="Plant Disease AI" />
    <meta property="og:description" content="Detect crop diseases from leaf photos using AI" />
    <meta property="og:type" content="website" />

    <!-- Preconnect to API for faster first request -->
    <link rel="preconnect" href="%REACT_APP_API_URL%" />

    <!-- Google Fonts — Geist for clean agricultural aesthetic -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet" />

    <title>Plant Disease AI</title>

    <style>
      /* Critical CSS — prevent flash of unstyled content */
      *, *::before, *::after { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: 'Geist', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        -webkit-font-smoothing: antialiased;
        background-color: #f9fafb;
        color: #111827;
      }
      #loading-screen {
        position: fixed; inset: 0;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        background: linear-gradient(135deg, #f0fdf4 0%, #ffffff 50%, #f0fdf4 100%);
        z-index: 9999;
        transition: opacity 0.4s ease;
      }
      #loading-screen.fade-out { opacity: 0; pointer-events: none; }
      .loading-logo { font-size: 3rem; animation: pulse 2s ease-in-out infinite; }
      .loading-text {
        margin-top: 1rem; font-size: 1.125rem; font-weight: 600;
        color: #15803d; letter-spacing: -0.01em;
      }
      .loading-sub { margin-top: 0.5rem; font-size: 0.875rem; color: #6b7280; }
      @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.08); } }
    </style>
  </head>

  <body>
    <!-- Loading screen (removed by React once app mounts) -->
    <div id="loading-screen">
      <div class="loading-logo">🌿</div>
      <div class="loading-text">Plant Disease AI</div>
      <div class="loading-sub">Loading...</div>
    </div>

    <noscript>
      <div style="padding:2rem;text-align:center;font-family:sans-serif">
        <h1>🌿 Plant Disease AI</h1>
        <p>JavaScript is required to use this application.</p>
        <p>Please enable JavaScript in your browser settings and reload the page.</p>
      </div>
    </noscript>

    <div id="root"></div>

    <script>
      // Remove loading screen once React hydrates
      document.addEventListener('DOMContentLoaded', function () {
        const obs = new MutationObserver(function(mutations) {
          const root = document.getElementById('root');
          if (root && root.children.length > 0) {
            const screen = document.getElementById('loading-screen');
            if (screen) {
              screen.classList.add('fade-out');
              setTimeout(() => screen.remove(), 500);
            }
            obs.disconnect();
          }
        });
        obs.observe(document.getElementById('root') || document.body, {
          childList: true, subtree: true
        });
      });
    </script>
  </body>
</html>
